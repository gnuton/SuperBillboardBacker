name: 🚀 Publish
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm_release
    permissions:
      id-token: write # Required for OIDC Trusted Publishing
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/" # Required for OIDC to configure .npmrc
          cache: "npm"

      - run: npm ci

      - run: npm test -- --run

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version $VERSION --no-git-tag-version || true

      - run: npm run build

      # NODE_AUTH_TOKEN must NOT be set for OIDC Trusted Publishing
      - run: npm publish --provenance --access public
